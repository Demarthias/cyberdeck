# Cyberdeck Enhancements Configuration
# Additional settings for Tier 1-3 features

# === TIER 1: Threat Intelligence ===

# AbuseIPDB API (get free key at https://www.abuseipdb.com/api)
ABUSEIPDB_API_KEY=""
ABUSEIPDB_CONFIDENCE_THRESHOLD=75

# AlienVault OTX API (get free key at https://otx.alienvault.com/)
OTX_API_KEY=""

# Tor Exit Node Detection
TOR_CACHE_HOURS=6
TOR_DETECTION_ENABLED=true

# === TIER 1: Webhook Alerts ===

# Discord Webhook
DISCORD_WEBHOOK_URL=""

# Slack Webhook
SLACK_WEBHOOK_URL=""

# Custom Webhook
CUSTOM_WEBHOOK_URL=""

# Webhook Settings
WEBHOOK_ENABLED=true
WEBHOOK_MIN_SEVERITY="YELLOW"  # YELLOW or RED
WEBHOOK_RATE_LIMIT=30  # Seconds between alerts for same IP

# === TIER 2: Enhanced Honeypots ===

# Enable enhanced honeypots
ENHANCED_HONEYPOTS_ENABLED=true

# Honeypot ports (uses high ports to avoid needing root)
HONEYPOT_SSH_PORT=2222
HONEYPOT_WORDPRESS_PORT=8080
HONEYPOT_MYSQL_PORT=13306
HONEYPOT_RDP_PORT=13389

# === TIER 2: Automated Playbooks ===

# Enable automated response playbooks
PLAYBOOKS_ENABLED=true

# Playbook file location
PLAYBOOKS_FILE="${CYBERDECK_HOME}/playbooks/rules.conf"

# === TIER 3: Machine Learning ===

# Enable ML anomaly detection
ML_ANOMALY_ENABLED=true

# Anomaly threshold (standard deviations from baseline)
ML_ANOMALY_THRESHOLD=2.5

# Training period before detecting anomalies (hours)
ML_TRAINING_PERIOD_HOURS=24

# === TIER 3: Packet Inspection ===

# Enable deep packet inspection
PACKET_INSPECTION_ENABLED=true

# Auto-capture packets from high-threat IPs
AUTO_CAPTURE_THRESHOLD=7  # Threat score threshold

# Packet capture duration (seconds)
CAPTURE_DURATION=30

# === TIER 3: Distributed Network ===

# Enable distributed mode
DISTRIBUTED_ENABLED=false

# Network mode: master, slave, or peer
CYBERDECK_NETWORK_MODE="peer"

# Master address (for slave mode)
CYBERDECK_MASTER=""

# Peer addresses (comma-separated for peer mode)
CYBERDECK_PEERS=""

# Sync port
CYBERDECK_SYNC_PORT=9999

# Trust factor for shared threats (0.0-1.0)
DISTRIBUTED_TRUST_FACTOR=0.5
