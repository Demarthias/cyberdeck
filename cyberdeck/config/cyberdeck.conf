#!/bin/bash
# Cyberdeck Configuration File
# Edit these values to customize behavior

# Base directory
export CYBERDECK_HOME="${CYBERDECK_HOME:-$HOME/cyberdeck}"

# Logging configuration
export LOG_LEVEL=1  # 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR, 4=CRITICAL
export LOG_RETENTION_DAYS=7
export THREAT_RETENTION_DAYS=30

# Threat scoring thresholds
export THREAT_THRESHOLD_NOTIFY=5    # Send cockpit notification
export THREAT_THRESHOLD_BLOCK=8     # Auto-block IP

# Daemon intervals (seconds)
export SENSOR_INTERVAL=5            # How often to scan connections
export INTEL_INTERVAL=2             # How often to process intel queue
export FIREWALL_INTERVAL=1          # How often to check for blocks
export CONTAINMENT_INTERVAL=2       # How often to check containment queue
export SUPERVISOR_INTERVAL=10       # How often supervisor checks health
export CLEANUP_INTERVAL=3600        # How often to cleanup old data (1 hour)

# Heartbeat configuration
export HEARTBEAT_INTERVAL=10        # How often daemons update heartbeat
export HEARTBEAT_TIMEOUT=30         # Max age before daemon considered dead

# Trusted IPs (whitelist - never blocked)
export TRUSTED_IPS=(
    "127.0.0.1"
    "::1"
    # Add your trusted IPs here
    # "192.168.1.100"
)

# Suspicious ports (higher threat score)
export SUSPICIOUS_PORTS=(
    "23"    # Telnet
    "21"    # FTP
    "135"   # RPC
    "445"   # SMB
    "1433"  # MSSQL
    "3306"  # MySQL
    "5432"  # PostgreSQL
)

# High-risk ports (even higher threat score)
export HIGH_RISK_PORTS=(
    "3389"  # RDP
    "5900"  # VNC
    "22"    # SSH (if not expecting connections)
)

# Connection frequency thresholds
export CONN_FREQ_WARN=10    # Connections per minute to trigger warning
export CONN_FREQ_BLOCK=20   # Connections per minute to trigger block

# Threat score weights
export SCORE_SUSPICIOUS_PORT=2
export SCORE_HIGH_RISK_PORT=3
export SCORE_FREQ_MULTIPLIER=0.5    # Added to score per connection over threshold
export SCORE_NEW_IP=1               # First time seeing this IP
export SCORE_PREVIOUSLY_BLOCKED=5   # IP was blocked before

# Firewall mode
export FIREWALL_MODE="APP_LAYER"    # APP_LAYER or IPTABLES (requires root)
export REQUIRE_ROOT=false            # Set to true if you want iptables

# Honeypot configuration
export HONEYPOT_ENABLED=false       # Enable fake services
export HONEYPOT_PORTS=("2222" "8080")  # Ports for honeypot services

# Cockpit configuration
export COCKPIT_ENABLED=true
export COCKPIT_UPDATE_INTERVAL=5    # How often cockpit refreshes (seconds)
export COCKPIT_SHOW_DEBUG=false     # Show debug messages in cockpit

# Database configuration
export DB_PATH="${CYBERDECK_HOME}/config/threats.db"
export DB_BACKUP_INTERVAL=86400     # Backup database daily

# Performance settings
export MAX_QUEUE_SIZE=1000          # Max messages in pipe before dropping
export ENABLE_POWER_SAVE=false      # Reduce polling when on battery

# Notification settings
export NOTIFY_ON_BLOCK=true
export NOTIFY_ON_HIGH_THREAT=true
export NOTIFY_ON_DAEMON_FAILURE=true
